<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report — @harness-ready/create-app</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0D1117;
  --bg-panel: #161B22;
  --border: #30363D;
  --amber: #F0A030;
  --text: #E6EDF3;
  --text-dim: #8B949E;
  --text-muted: #6E7681;
  --link: #58A6FF;
  --body: 'IBM Plex Sans', 'Noto Sans SC', sans-serif;
  --display: 'Space Grotesk', 'Noto Sans SC', sans-serif;
  --mono: 'JetBrains Mono', 'Noto Sans SC', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  line-height: 1.7;
}

/* ── Top bar ──────────────────────────────────── */
.topbar {
  position: sticky;
  top: 0;
  background: rgba(13,17,23,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0.75rem 2rem;
  display: flex;
  align-items: center;
  gap: 1.5rem;
  z-index: 10;
  font-family: var(--mono);
  font-size: 0.85rem;
}
.topbar a {
  color: var(--text-dim);
  text-decoration: none;
  transition: color 0.2s;
}
.topbar a:hover { color: var(--amber); }
.topbar .sep { color: var(--text-muted); }

/* ── Content ──────────────────────────────────── */
main {
  max-width: 780px;
  margin: 0 auto;
  padding: 3rem 2rem 6rem;
}

/* Headings */
main h1 { font-family: var(--display); font-size: 2.4rem; font-weight: 700; margin: 2.5rem 0 1rem; line-height: 1.2; }
main h1:first-child { margin-top: 0; }
main h2 { font-family: var(--display); font-size: 1.6rem; font-weight: 600; margin: 2.5rem 0 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
main h3 { font-family: var(--display); font-size: 1.2rem; font-weight: 600; margin: 1.5rem 0 0.5rem; color: var(--text-dim); }
main h4 { font-family: var(--display); font-size: 1rem; font-weight: 600; margin: 1.25rem 0 0.5rem; color: var(--text-dim); }

/* Paragraphs & text */
main p { margin-bottom: 1rem; color: var(--text-dim); }
main p strong { color: var(--text); font-weight: 500; }
main a { color: var(--link); text-decoration: none; }
main a:hover { text-decoration: underline; }

/* Code */
main code {
  font-family: var(--mono);
  font-size: 0.9em;
  background: var(--bg-panel);
  padding: 0.15em 0.4em;
  border-radius: 4px;
  color: var(--amber);
}
main pre {
  font-family: var(--mono);
  font-size: 0.85rem;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.25rem 1.5rem;
  overflow-x: auto;
  margin: 1rem 0 1.5rem;
  line-height: 1.6;
  color: var(--text-dim);
}

/* Blockquotes */
main blockquote {
  border-left: 3px solid var(--amber);
  padding: 0.75rem 1.25rem;
  margin: 1.5rem 0;
  background: var(--bg-panel);
  border-radius: 0 8px 8px 0;
}
main blockquote p { color: var(--text-dim); font-style: italic; margin-bottom: 0.5rem; }

/* Lists */
main ul, main ol { margin: 0.75rem 0 1.25rem 1.5rem; color: var(--text-dim); }
main li { margin-bottom: 0.35rem; }

/* Tables */
main table {
  width: 100%;
  border-collapse: collapse;
  margin: 1.25rem 0;
  font-size: 0.9rem;
}
main th {
  font-family: var(--display);
  font-weight: 600;
  text-align: left;
  padding: 0.6rem 1rem;
  border-bottom: 2px solid var(--border);
  color: var(--text);
}
main td {
  padding: 0.5rem 1rem;
  border-bottom: 1px solid var(--border);
  color: var(--text-dim);
}

/* Horizontal rules */
main hr { border: none; border-top: 1px solid var(--border); margin: 2.5rem 0; }

/* ── Loading state ─────────────────────────────── */
.loading { text-align: center; padding: 5rem 2rem; color: var(--text-muted); font-family: var(--body); }

/* ── Responsive ────────────────────────────────── */
@media (max-width: 700px) {
  main { padding: 2rem 1.25rem 4rem; }
  main h1 { font-size: 1.8rem; }
  main h2 { font-size: 1.3rem; }
}
</style>
</head>
<body>

<div class="topbar">
  <a href="./index.html">@harness-ready/create-app</a>
  <span class="sep">/</span>
  <span id="docTitle" style="color: var(--text-dim);">Report</span>
</div>

<main id="content"><div class="loading">Loading...</div></main>

<script>
(async function() {
  const params = new URLSearchParams(window.location.search);
  const src = params.get('src') || 'research-report.md';

  document.getElementById('docTitle').textContent = src;

  try {
    const res = await fetch(src);
    if (!res.ok) throw new Error('Failed to load: ' + src);
    const md = await res.text();

    // Minimal markdown → HTML renderer (handles the most common GFM constructs)
    const html = renderMarkdown(md);
    document.getElementById('content').innerHTML = html;
  } catch (err) {
    document.getElementById('content').innerHTML =
      '<p style="color: var(--text-muted); text-align: center; padding: 3rem;">Failed to load: ' + err.message + '</p>';
  }
})();

function renderMarkdown(md) {
  // Escape HTML first
  let s = md.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // Code blocks (fenced)
  s = s.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
    return '<pre><code>' + code.trimEnd() + '</code></pre>';
  });

  // Inline code
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');

  // Bold & italic
  s = s.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');

  // Headings
  s = s.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Horizontal rules
  s = s.replace(/^---$/gm, '<hr>');

  // Blockquotes
  s = s.replace(/^> (.+)$/gm, '<p class="bq">$1</p>');
  s = s.replace(/(<p class="bq">(?:\n<p class="bq">)*)<\/p>\n((?:<p class="bq">.*?<\/p>\n?)*)/g, function(_, first, rest) {
    return '<blockquote>' + first + '</p>\n' + rest.replace(/class="bq"/g, '') + '</blockquote>';
  });

  // Peform blockquote wrapping (simplified)
  const bqs = [];
  s = s.replace(/^<p class="bq">.*?<\/p>$/gm, function(m) {
    bqs.push(m);
    return '%%BQ%%';
  });
  // This is getting complicated — let me use a simpler approach

  // Tables
  const lines = s.split('\n');
  let out = [];
  let inTable = false;
  let tableRows = [];
  let tableIsHeader = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();

    // Table detection
    if (trimmed.startsWith('|') && trimmed.endsWith('|')) {
      if (trimmed.match(/^\|[-: |]+\|$/)) {
        tableIsHeader = true;
        continue;
      }
      if (!inTable) { inTable = true; tableRows = []; tableIsHeader = false; }
      tableRows.push(trimmed);
      continue;
    } else if (inTable) {
      out.push(renderTable(tableRows));
      inTable = false;
      tableRows = [];
    }

    // For non-table lines, pass through current line state
    out.push(line);
  }
  if (inTable) out.push(renderTable(tableRows));
  s = out.join('\n');

  // Unordered lists
  s = s.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
  s = s.replace(/((?:<li>.*?<\/li>\n?)+)/g, '<ul>\n$1</ul>');

  // Ordered lists
  s = s.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

  // Paragraphs: wrap consecutive non-empty, non-tag lines in <p>
  s = s.replace(/^(?!<\/?(?:h[1-4]|pre|ul|ol|li|table|blockquote|hr|p|div|tr|td|th|thead|tbody))[^<\n][^\n]*$/gm, '<p>$1</p>');

  // Clean up empty paragraphs
  s = s.replace(/<p>\s*<\/p>/g, '');

  return s;
}

function renderTable(rows) {
  if (rows.length === 0) return '';
  const cells = rows.map(r => r.replace(/^\||\|$/g, '').split('|').map(c => c.trim()));
  const header = cells[0];
  const body = cells.slice(1);

  let html = '<table>\n<thead>\n<tr>';
  for (const h of header) html += '<th>' + h + '</th>';
  html += '</tr>\n</thead>\n<tbody>\n';
  for (const row of body) {
    html += '<tr>';
    for (const c of row) html += '<td>' + c + '</td>';
    html += '</tr>\n';
  }
  html += '</tbody>\n</table>';
  return html;
}
</script>

</body>
</html>
